<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - VSRFARM'S</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/Js/script.js?v=1.3"></script>
    <!-- AUTH GUARD -->
    <script>
        (function() {
            const isOwner = localStorage.getItem('vsr_owner_active') === 'true';
            if (!isOwner) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }

        .bg-blue {
            background: #3498db;
        }

        .bg-green {
            background: #2ecc71;
        }

        .bg-orange {
            background: #e67e22;
        }

        .stat-info h3 {
            margin: 0;
            font-size: 2rem;
            color: #333;
        }

        .stat-info p {
            margin: 0;
            color: #777;
            font-size: 0.9rem;
        }

        .section-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .data-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .data-card h3 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            color: #7f8c8d;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: #e8f8f5;
            color: #27ae60;
        }

        .view-list li {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f9f9f9;
        }

        .view-count {
            background: #eee;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html" class="logo-text">
                    <img src="/images/logo.png?v=1.3" alt="VSR Logo"> VSRFARM'S
                </a>
            </div>
            <div class="menu-toggle" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="products.html"><i class="fas fa-store"></i> Products</a></li>
                <li><a href="payment.html"><i class="fas fa-credit-card"></i> Payment</a></li>
                <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact</a></li>
            </ul>
            <div class="nav-right">
                <div class="cart-icon" onclick="window.location.href='payment.html'">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="cart-count">0</span>
                </div>
                <!-- Profile Flip Icon -->
                <div class="profile-flip-container" id="profileFlip">
                    <div class="profile-flipper">
                        <div class="profile-front">
                            <!-- Populated by JS -->
                        </div>
                        <div class="profile-back">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
                <button id="headerLogout" class="header-logout-btn" onclick="handleGlobalLogout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </nav>
    </header>

        <div class="stats-header" style="margin-bottom: 30px;">
            <h1 style="margin: 0;"><i class="fas fa-chart-line"></i> Owner Dashboard</h1>
        </div>

        <!-- Top Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon bg-blue"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <h3 id="totalCustomers">0</h3>
                    <p>Total Customers</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-green"><i class="fas fa-shopping-bag"></i></div>
                <div class="stat-info">
                    <h3 id="totalOrders">0</h3>
                    <p>Total Orders</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-orange"><i class="fas fa-rupee-sign"></i></div>
                <div class="stat-info">
                    <h3 id="totalSales">0</h3>
                    <p>Total Revenue</p>
                </div>
            </div>
        </div>

        <div class="section-grid" style="grid-template-columns: 1fr;">
            <!-- Order Management -->
            <div class="data-card">
                <h3>Order Management</h3>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Amount</th>
                                <th>Date</th>
                                <th>Payment</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="adminOrdersTable">
                            <tr>
                                <td colspan="7">Loading orders...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="section-grid" style="margin-top: 20px;">
            <!-- Recent Activity Stats (Product Views Placeholder) -->
            <div class="data-card">
                <h3>Product Popularity</h3>
                <ul class="view-list" id="viewsList" style="list-style: none; padding: 0;">
                    <li>Loading...</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Logout Logic to clear session
        function logoutOwner() {
            localStorage.removeItem('vsr_owner_active');
            window.location.href = 'owner_login.html';
        }

        async function fetchStats() {
            try {
                const res = await fetch(`${API_BASE_URL}/admin/stats`);
                const data = await res.json();

                // Update Stats
                document.getElementById('totalCustomers').innerText = data.totalCustomers;
                document.getElementById('totalOrders').innerText = data.totalOrders;
                document.getElementById('totalSales').innerText = '₹' + data.totalSales;

                // Update Views List (Popularity)
                const viewsHtml = data.productViews.map(view => `
                    <li>
                        <span>${view._id}</span>
                        <span class="view-count">${view.count} views</span>
                    </li>
                `).join('');
                document.getElementById('viewsList').innerHTML = viewsHtml || '<li>No activity yet</li>';

                // Fetch All Orders for Management
                const ordersRes = await fetch(`${API_BASE_URL}/admin/orders`);
                const orders = await ordersRes.json();
                
                const adminOrdersHtml = orders.map(order => {
                    const status = order.status || 'Pending';
                    return `
                    <tr>
                        <td>#${order.id}</td>
                        <td>${order.customerName || 'Guest'}</td>
                        <td>₹${order.total_amount}</td>
                        <td>${new Date(order.order_date).toLocaleDateString()}</td>
                        <td><span style="font-size:0.8rem; color:#666;">${order.payment_method}</span><br><span style="font-size:0.75rem; color:${order.payment_status === 'Paid' ? '#27ae60' : '#e67e22'}">${order.payment_status}</span></td>
                        <td>
                            <select onchange="updateOrderStatus('${order.id}', this.value)" style="padding:4px; border-radius:4px; border:1px solid #ddd; font-size:0.85rem;">
                                <option value="Pending" ${status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Processing" ${status === 'Processing' ? 'selected' : ''}>Processing</option>
                                <option value="Out for Delivery" ${status === 'Out for Delivery' ? 'selected' : ''}>Out for Delivery</option>
                                <option value="Delivered" ${status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="Cancelled" ${status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </td>
                        <td>
                            <button onclick="window.open('orders.html?id=${order.id}', '_blank')" style="background:none; border:none; color:#3498db; cursor:pointer;" title="View Details">
                                <i class="fas fa-eye"></i>
                            </button>
                        </td>
                    </tr>
                `}).join('');
                document.getElementById('adminOrdersTable').innerHTML = adminOrdersHtml || '<tr><td colspan="7">No orders found.</td></tr>';

            } catch (err) {
                console.error("Failed to fetch dashboard data", err);
            }
        }

        async function updateOrderStatus(orderId, newStatus) {
            try {
                const res = await fetch(`${API_BASE_URL}/admin/order/${orderId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                if (res.ok) {
                    alert('Order status updated!');
                    // Short delay before refresh
                    setTimeout(fetchStats, 500);
                }
            } catch (err) {
                console.error("Failed to update status", err);
            }
        }

        fetchStats();
        // Refresh every 30 seconds
        setInterval(fetchStats, 30000);
    </script>
</body>

</html>
