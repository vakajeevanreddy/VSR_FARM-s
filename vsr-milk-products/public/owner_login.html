<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login - VSRFARM'S</title>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/CSS/style.css?v=1.3">
    <style>
        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-container {
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border-top: 5px solid var(--primary);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            object-fit: contain;
        }

        .login-container h1 {
            font-size: 1.8rem;
            color: var(--text-dark);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .login-container p {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            transition: var(--transition);
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .input-group input:focus + i {
            color: var(--primary);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2);
        }

        .login-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(39, 174, 96, 0.3);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            display: none;
        }

        .message.error {
            display: block;
            background-color: #fde8e8;
            color: #c81e1e;
            border: 1px solid #f8b4b4;
        }

        .message.success {
            display: block;
            background-color: #defadb;
            color: #1e521e;
            border: 1px solid #bce6bc;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="/images/logo.png?v=1.3" alt="VSR Logo" class="login-logo">
        <h1>Owner Login</h1>
        <p>Access the management panel</p>

        <form id="ownerLoginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="owner@vsrmilk.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div id="loginMessage" class="message"></div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <script src="/Js/script.js?v=1.3"></script>
    <script>
        document.getElementById('ownerLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('loginMessage');
            const submitBtn = this.querySelector('.login-btn');

            // Clear previous message
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            // Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

            try {
                const response = await fetch(`${API_BASE_URL}/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success
                    messageDiv.textContent = "Login successful! Redirecting...";
                    messageDiv.classList.add('success');
                    messageDiv.style.display = 'block';

                    // Store session data
                    localStorage.setItem('vsr_token', data.token);
                    localStorage.setItem('vsr_user', JSON.stringify(data.user));
                    localStorage.setItem('user_role', data.user.role);

                    // Redirect only if owner
                    if (data.user.role === 'owner') {
                        setTimeout(() => {
                            window.location.href = 'owner_dashboard.html';
                        }, 1500);
                    } else {
                        messageDiv.textContent = "Access Denied: Not an Owner account.";
                        messageDiv.className = 'message error';
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Login';
                    }
                } else {
                    // Failure
                    messageDiv.textContent = data.error || "Invalid credentials. Try again.";
                    messageDiv.classList.add('error');
                    messageDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error("Login Error:", error);
                messageDiv.textContent = "Connection to server failed. Please try again.";
                messageDiv.classList.add('error');
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
