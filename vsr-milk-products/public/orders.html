<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | VSRFARM'S</title>
    <link rel="stylesheet" href="/CSS/style.css?v=1.3">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .orders-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .order-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 24px;
            overflow: hidden;
            border: 1px solid #f0f0f0;
        }

        .order-header {
            background: #fcfcfc;
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .order-info {
            display: flex;
            gap: 30px;
            font-size: 0.85rem;
            color: #777;
        }

        .order-info strong {
            display: block;
            color: #333;
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .order-status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending { background: #fffcf0; color: #b7791f; }
        .status-confirmed { background: #f0fff4; color: #2f855a; }
        .status-shipped { background: #ebf8ff; color: #2b6cb0; }
        .status-delivered { background: #f0fff4; color: #2f855a; }
        .status-cancelled { background: #fff5f5; color: #c53030; }

        .order-body {
            padding: 24px;
        }

        .order-item {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f9f9f9;
        }

        .order-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .order-item img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: #fafafa;
            border-radius: 6px;
            padding: 4px;
        }

        .item-details { flex: 1; }
        .item-name { font-weight: 600; font-size: 0.95rem; color: #212121; }
        .item-meta { font-size: 0.85rem; color: #888; }

        .order-footer {
            padding: 16px 24px;
            background: #fff;
            border-top: 1px solid #f9f9f9;
            display: flex;
            justify-content: flex-end;
        }

        .total-box {
            text-align: right;
        }

        .total-label { font-size: 0.85rem; color: #777; }
        .total-price { font-size: 1.2rem; font-weight: 700; color: #27ae60; }

        .empty-orders {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-orders i { font-size: 4rem; color: #e0e0e0; margin-bottom: 20px; }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #27ae60;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <!-- ===== SHARED NAVBAR ===== -->
    <header>
        <nav>
            <div class="logo">
                <a href="index.html" class="logo-text">
                    <img src="/images/logo.png?v=1.3" alt="VSR Logo"> VSRFARM'S
                </a>
            </div>
            <div class="menu-toggle" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="products.html"><i class="fas fa-store"></i> Products</a></li>
                <li><a href="payment.html"><i class="fas fa-credit-card"></i> Payment</a></li>
                <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact</a></li>
            </ul>
            <div class="nav-right">
                <div class="cart-icon" onclick="window.location.href='payment.html'" title="Checkout">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="cart-count">0</span>
                </div>
                <div class="profile-flip-container" id="profileFlip">
                    <div class="profile-flipper">
                        <div class="profile-front"><!-- Populated by JS --></div>
                        <div class="profile-back"><!-- Populated by JS --></div>
                    </div>
                </div>
                <button id="headerLogout" class="header-logout-btn" onclick="handleGlobalLogout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </nav>
    </header>

    <div class="orders-container">
        <a href="customer.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Profile
        </a>
        
        <h1 style="margin-bottom: 30px; font-weight: 700;">My Orders</h1>
        
        <div id="orders-list">
            <div style="text-align:center; padding:50px;">
                <i class="fas fa-spinner fa-spin" style="font-size:2rem; color:#27ae60;"></i>
                <p style="margin-top:10px; color:#666;">Loading your orders...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 VSRFARM'S. All Rights Reserved.</p>
        <p>Kavali, Andhra Pradesh - 524201</p>
    </footer>

    <script src="/Js/script.js?v=1.3"></script>
    <script>
        async function loadOrders() {
            const list = document.getElementById('orders-list');
            const user = JSON.parse(localStorage.getItem('vsr_user'));

            if (!user || (!user.id && !user.uid)) {
                list.innerHTML = `
                    <div class="empty-orders">
                        <i class="fas fa-user-lock"></i>
                        <h2>Please login</h2>
                        <p>You need to be logged in to view your orders.</p>
                        <a href="login.html" class="standard-btn" style="display:inline-block; margin-top:20px; padding:10px 30px;">Login Now</a>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/orders/user/${user.id || user.uid}`);
                if (!response.ok) throw new Error('Failed to fetch orders');
                
                const orders = await response.json();

                if (orders.length === 0) {
                    list.innerHTML = `
                        <div class="empty-orders">
                            <i class="fas fa-box-open"></i>
                            <h2>No orders yet</h2>
                            <p>Looks like you haven't placed any orders yet. Explore our fresh products!</p>
                            <a href="products.html" class="standard-btn" style="display:inline-block; margin-top:20px; padding:10px 30px;">Shop Now</a>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = '';
                for (const order of orders) {
                    const card = document.createElement('div');
                    card.className = 'order-card';
                    
                    const date = new Date(order.order_date).toLocaleDateString('en-IN', {
                        day: 'numeric', month: 'short', year: 'numeric'
                    });

                    card.innerHTML = `
                        <div class="order-header">
                            <div class="order-info">
                                <div><strong>ORDER PLACED</strong> ${date}</div>
                                <div><strong>TOTAL</strong> ₹${order.total_amount}</div>
                                <div><strong>SHIP TO</strong> ${user.name}</div>
                            </div>
                            <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
                                <div class="order-status status-${order.status}">${order.status}</div>
                                <div style="font-size:0.75rem; color:#999;">ID: #${order.id}</div>
                            </div>
                        </div>
                        <div class="order-body" id="items-${order.id}">
                            <i class="fas fa-circle-notch fa-spin"></i> Loading items...
                        </div>
                        <div class="order-footer">
                            <div class="total-box">
                                <span class="total-label">Grand Total</span>
                                <div class="total-price">₹${order.total_amount}</div>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                    
                    // Fetch items for this order
                    fetchItems(order.id);
                }
            } catch (err) {
                console.error(err);
                list.innerHTML = '<p style="text-align:center; color:red; padding:40px;">Error loading orders. Please try again later.</p>';
            }
        }

        async function fetchItems(orderId) {
            const container = document.getElementById(`items-${orderId}`);
            try {
                const response = await fetch(`${API_BASE_URL}/orders/details/${orderId}`);
                if (!response.ok) throw new Error();
                const items = await response.json();

                container.innerHTML = items.map(item => `
                    <div class="order-item">
                        <img src="${item.image_url || 'images/default_product.png'}" alt="${item.name}">
                        <div class="item-details">
                            <div class="item-name">${item.name}</div>
                            <div class="item-meta">Qty: ${item.quantity} | Price: ₹${item.price}</div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = '<p style="color:#999; font-size:0.8rem;">Could not load items.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadOrders);
    </script>
</body>

</html>
